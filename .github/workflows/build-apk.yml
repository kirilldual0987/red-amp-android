name: Build Android APK

on:
  # Manual trigger
  workflow_dispatch:
  
  # Automatic on push to main
  push:
    branches: [ main, master ]
    paths:
      - 'main.py'
      - 'buildozer.spec'
      - '.github/workflows/build-apk.yml'
  
  # Automatic on release tag
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install System Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          build-essential \
          git \
          openjdk-17-jdk \
          unzip \
          zip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev \
          automake \
          gettext \
          libltdl-dev
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.36
    
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          .buildozer
          ~/.buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
    
    - name: Build APK
      run: |
        yes | buildozer android debug || true
      env:
        BUILDOZER_WARN_ON_ROOT: 0
    
    - name: List Build Output
      run: |
        echo "=== Bin directory ==="
        ls -lah bin/ || echo "No bin directory"
        echo "=== Build directory ==="
        ls -lah .buildozer/ || echo "No .buildozer directory"
    
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Red-Amp-APK
        path: bin/*.apk
        if-no-files-found: error
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
        body: |
          # Red-Amp Player v${{ github.ref_name }}
          
          ## 📱 Android Music Player
          
          **Features:**
          - ✅ Play MP3, WAV, OGG, M4A, FLAC
          - ✅ Folder scanning
          - ✅ Playlist management
          - ✅ Audio visualizer
          - ✅ Shuffle & Repeat modes
          - ✅ Dark theme without emojis
          
          **Minimum Android:** 5.0 (Lollipop / API 21)
          
          **Installation:**
          1. Download `Red-Amp-v*.apk`
          2. Enable "Unknown sources" in Android settings
          3. Install APK
          4. Grant storage permissions
          
          ---
          Built with ❤️ by GitHub Actions
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
